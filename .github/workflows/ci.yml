name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v4
        with:
          cache: true

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -v -count=1 ./...
